# 5chan board manager only — use when bitsocial-cli is already running elsewhere
#
# Quick start:
#   cp docker-compose.standalone.example.yml docker-compose.yml
#   # Edit PKC_RPC_WS_URL to point at your running bitsocial-cli instance
#   # Create /data/config.json with your boards (see README.md)
#   docker compose up -d
#
# IMPORTANT: the default preset (src/presets/community-defaults.jsonc) references
# @bitsocial/spam-blocker-challenge. If you plan to use `5chan board add
# --apply-defaults`, install the challenge on your bitsocial-cli instance first:
#   bitsocial challenge install @bitsocial/spam-blocker-challenge
# Otherwise remove both spam-blocker entries from your preset (they are marked
# optional in the file) or pass --skip-apply-defaults.
#
# View logs:
#   docker compose logs -f 5chan

services:
  5chan:
    image: ghcr.io/bitsocialnet/5chan-board-manager:latest
    container_name: 5chan
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - 5chan-data:/data
    environment:
      # Append your bitsocial-cli auth key to the URL.
      # Find it with: docker logs <bitsocial-container> 2>&1 | grep "secret auth key"
      - PKC_RPC_WS_URL=ws://host.docker.internal:9138/YOUR-AUTH-KEY

volumes:
  5chan-data:
